<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>LilyGo T5 S3 (960x540) 墨水屏 1:1 模擬器</title>
  <style>
    body {
      background-color: #2b2b2b;
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 { margin-bottom: 5px; font-size: 22px; }
    p { color: #aaa; margin-top: 0; margin-bottom: 20px; font-size: 14px; }

    /* 模擬 E-Ink 墨水屏實體外框 */
    .epd-frame {
      background-color: #ffffff;
      border: 12px solid #1a1a1a;
      border-right: 35px solid #1a1a1a; /* 模擬右側 LILYGO 邊框 */
      border-radius: 6px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      position: relative;
    }

    /* 右側 LILYGO® 標誌 */
    .epd-frame::after {
      content: "LILYGO®";
      position: absolute;
      right: -28px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      color: #888;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 2px;
    }

    /* 畫布 Canvas (960 x 540) */
    canvas {
      display: block;
      background-color: #ffffff; /* 墨水屏純白底色 */
    }

    .info-panel {
      margin-top: 15px;
      background: #1e1e1e;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 13px;
      color: #4af626;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <h1>LilyGo T5 S3 Dashboard 精確模擬器</h1>
  <p>解析度：960 x 540 | 滑鼠移到畫布上可即時顯示 (X, Y) 座標</p>

  <div class="epd-frame">
    <canvas id="epdCanvas" width="960" height="540"></canvas>
  </div>

  <div class="info-panel" id="coordInfo">
    滑鼠座標：X: 0, Y: 0
  </div>

<script>
  const canvas = document.getElementById('epdCanvas');
  const ctx = canvas.getContext('2d');
  const coordInfo = document.getElementById('coordInfo');

  // 即時顯示 X, Y 座標
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = Math.round(e.clientX - rect.left);
    const y = Math.round(e.clientY - rect.top);
    coordInfo.innerText = `滑鼠座標：X: ${x}, Y: ${y}`;
  });

  // =========================================================
  // 🎨 繪製小工具函數 (與 C++ / Canvas 1:1 對應)
  // =========================================================

  // 太陽 Icon (與圖片一致)
  function drawSunIcon(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 9, 0, Math.PI * 2);
    ctx.fillStyle = "#f39c12"; // 太陽亮黃/橘色
    ctx.fill();

    ctx.strokeStyle = "#f39c12";
    ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const angle = (i * Math.PI) / 4;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(angle) * 12, y + Math.sin(angle) * 12);
      ctx.lineTo(x + Math.cos(angle) * 16, y + Math.sin(angle) * 16);
      ctx.stroke();
    }
    ctx.strokeStyle = "#000000";
    ctx.fillStyle = "#000000";
  }

  // 橫向虛線
  function drawDashedHLine(x1, x2, y) {
    ctx.setLineDash([3, 3]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = "#dddddd";
    ctx.beginPath();
    ctx.moveTo(x1, y);
    ctx.lineTo(x2, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = "#000000";
  }

  // 垂直虛線
  function drawDashedVLine(x, y1, y2) {
    ctx.setLineDash([3, 3]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = "#dddddd";
    ctx.beginPath();
    ctx.moveTo(x, y1);
    ctx.lineTo(x, y2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = "#000000";
  }

  // =========================================================
  // 🚀 1:1 還原圖片格調的渲染核心
  // =========================================================
  function renderDashboard() {
    // 1. 底色
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, 960, 540);
    ctx.fillStyle = '#000000';
    ctx.strokeStyle = '#000000';

    // 2. 頂部 Header
    ctx.font = "bold 20px 'PingFang TC', 'Microsoft JhengHei', sans-serif";
    ctx.fillText("2026年7月24日 (星期五)", 20, 35);
    ctx.font = "14px sans-serif";
    ctx.fillStyle = "#555555";
    ctx.fillText("最後更新", 810, 35);
    ctx.font = "bold 15px sans-serif";
    ctx.fillStyle = "#000000";
    ctx.fillText("10:50", 875, 35);

    // 頂部黑色粗線
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(20, 48); ctx.lineTo(940, 48); ctx.stroke();

    // ---------------------------------------------------------
    // ----------------【左上】🚌 巴士實時到站 (ETA) ----------------
    // ---------------------------------------------------------
    ctx.font = "bold 17px sans-serif";
    ctx.fillText("🚌  巴士實時到站 (ETA)", 20, 85);

    // 680 標牌 (黑底白字)
    ctx.fillRect(20, 105, 58, 30);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 22px sans-serif";
    ctx.fillText("680", 28, 128);
    ctx.fillStyle = "#000000";

    ctx.font = "bold 15px sans-serif";
    ctx.fillText("往 金鐘站(東)", 88, 118);
    ctx.font = "12px sans-serif"; ctx.fillStyle = "#777777";
    ctx.fillText("小瀝源路草地滾球場", 88, 134);
    ctx.fillStyle = "#000000";

    // 到站時間行繪製
    const drawEtaRow = (num, y) => {
      ctx.font = "bold 26px sans-serif";
      ctx.fillText(num, 20, y);
      ctx.font = "14px sans-serif";
      ctx.fillText("分鐘", 38, y - 2);

      // 城巴邊框
      ctx.lineWidth = 1;
      ctx.strokeRect(200, y - 18, 32, 20);
      ctx.font = "11px sans-serif";
      ctx.fillText("城巴", 205, y - 4);
    };

    drawEtaRow("3", 175);
    drawDashedHLine(20, 235, 192);
    drawEtaRow("22", 220);
    drawDashedHLine(20, 235, 237);
    drawEtaRow("42", 265);

    // 垂直線 (分隔 680 與 682B)
    ctx.lineWidth = 1; ctx.strokeStyle = "#eee";
    ctx.beginPath(); ctx.moveTo(250, 105); ctx.lineTo(250, 270); ctx.stroke();
    ctx.strokeStyle = "#000";

    // 682B 標牌 (黑底白字)
    ctx.fillRect(270, 105, 72, 30);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 22px sans-serif";
    ctx.fillText("682B", 276, 128);
    ctx.fillStyle = "#000000";

    ctx.font = "bold 15px sans-serif";
    ctx.fillText("往 柴灣(東)", 352, 118);
    ctx.font = "12px sans-serif"; ctx.fillStyle = "#777777";
    ctx.fillText("第一城站，插桅杆街", 352, 134);

    ctx.font = "14px sans-serif"; ctx.fillStyle = "#999999";
    ctx.fillText("非服務時間 / 暫無班次", 320, 190);
    ctx.fillStyle = "#000000";

    // 左側主橫線 (Y = 300)
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(20, 300); ctx.lineTo(510, 300); ctx.stroke();

    // ---------------------------------------------------------
    // ----------------【右上】🥑 食品過期清單 ----------------
    // ---------------------------------------------------------
    ctx.font = "bold 17px sans-serif";
    ctx.fillText("🥑  食品過期清單", 535, 85);

    // 節瓜 (黑底白字)
    ctx.font = "bold 15px sans-serif";
    ctx.fillText("節瓜", 535, 128);
    ctx.fillRect(675, 110, 48, 22);
    ctx.fillStyle = "#ffffff"; ctx.font = "12px sans-serif";
    ctx.fillText("剩 2 天", 681, 125); ctx.fillStyle = "#000000";

    // 豆腐 (白底黑框)
    ctx.font = "bold 15px sans-serif";
    ctx.fillText("豆腐", 740, 128);
    ctx.strokeRect(880, 110, 48, 22);
    ctx.font = "12px sans-serif";
    ctx.fillText("剩 6 天", 886, 125);

    drawDashedHLine(535, 930, 145);

    // 火腿 (白底黑框)
    ctx.font = "bold 15px sans-serif";
    ctx.fillText("火腿", 535, 173);
    ctx.strokeRect(668, 155, 55, 22);
    ctx.font = "12px sans-serif";
    ctx.fillText("剩 13 天", 672, 170);

    // 雞蛋 (白底黑框)
    ctx.font = "bold 15px sans-serif";
    ctx.fillText("雞蛋", 740, 173);
    ctx.strokeRect(873, 155, 55, 22);
    ctx.font = "12px sans-serif";
    ctx.fillText("剩 69 天", 877, 170);

    // ---------------------------------------------------------
    // ----------------【左下】⛅ 地區天氣簡報 ----------------
    // ---------------------------------------------------------
    ctx.font = "bold 17px sans-serif";
    ctx.fillText("⛅  地區天氣簡報", 20, 340);

    const drawWeatherCol = (city, temp, hum, x) => {
      drawSunIcon(x + 12, 380);
      ctx.font = "bold 16px sans-serif";
      ctx.fillText(city, x + 30, 385);

      ctx.font = "bold 28px sans-serif";
      ctx.fillText(temp, x, 428);
      ctx.font = "16px sans-serif"; ctx.fillText("°C", x + 58, 415);

      ctx.font = "12px sans-serif"; ctx.fillStyle = "#555555";
      ctx.fillText(`相對濕度 ${hum}%`, x, 452);
      ctx.fillStyle = "#000000";
    };

    drawWeatherCol("沙田", "32.0", "58", 20);
    drawDashedVLine(170, 370, 460);

    drawWeatherCol("鰂魚涌", "32.0", "58", 195);
    drawDashedVLine(340, 370, 460);

    drawWeatherCol("天后", "32.0", "58", 365);

    // ---------------------------------------------------------
    // ----------------【右下】📌 重要事項提醒 ----------------
    // ---------------------------------------------------------
    // 右側主橫線 (Y = 300)
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(535, 300); ctx.lineTo(930, 300); ctx.stroke();

    ctx.font = "bold 17px sans-serif";
    ctx.fillText("📌  重要事項提醒", 535, 340);

    // 買蠔油 (黑底白字 Tag)
    ctx.font = "bold 16px sans-serif";
    ctx.fillText("買蠔油", 535, 395);
    ctx.fillRect(865, 378, 65, 24);
    ctx.fillStyle = "#ffffff"; ctx.font = "12px sans-serif";
    ctx.fillText("今日到期", 873, 394); ctx.fillStyle = "#000000";

    drawDashedHLine(535, 930, 420);

    // 續借書 (白底黑框 Tag)
    ctx.font = "bold 16px sans-serif";
    ctx.fillText("續借書", 535, 455);
    ctx.strokeRect(845, 438, 85, 24);
    ctx.font = "12px sans-serif";
    ctx.fillText("14 天後跟進", 852, 454);

    drawDashedHLine(535, 930, 480);
  }

  // 執行繪製
  renderDashboard();
</script>

</body>
</html>
