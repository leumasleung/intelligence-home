<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>LilyGo T5 S3 (960x540) 1:1 精確還原 Dashboard</title>
  <style>
    body {
      background-color: #1e1e1e;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .epd-frame {
      background-color: #ffffff;
      border: 14px solid #2a2a2a;
      border-right: 38px solid #2a2a2a;
      border-radius: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      position: relative;
    }
    .epd-frame::after {
      content: "LILYGO®";
      position: absolute;
      right: -30px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      color: #888;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 2px;
    }
    canvas { display: block; background-color: #ffffff; }
  </style>
</head>
<body>

  <h2>LilyGo Dashboard 1:1 繪製模擬器 (960x540)</h2>

  <div class="epd-frame">
    <canvas id="epdCanvas" width="960" height="540"></canvas>
  </div>

<script>
  const canvas = document.getElementById('epdCanvas');
  const ctx = canvas.getContext('2d');

  function render() {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, 960, 540);
    ctx.fillStyle = "#000000";
    ctx.strokeStyle = "#000000";

    // 1. 頂部 Header
    ctx.font = "bold 20px 'PingFang TC', 'Microsoft JhengHei', sans-serif";
    ctx.fillText("2026年7月24日 (星期五)", 20, 35);
    ctx.font = "16px sans-serif";
    ctx.fillText("最後更新 10:45", 830, 35);

    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(20, 50); ctx.lineTo(940, 50); ctx.stroke();

    // ---------------- 左上：巴士到站 (ETA) ----------------
    ctx.font = "bold 18px sans-serif";
    ctx.fillText("🚌 巴士實時到站 (ETA)", 20, 90);

    // 680 路線標牌 (黑底白字)
    ctx.fillRect(20, 110, 80, 38);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 26px sans-serif";
    ctx.fillText("680", 35, 138);
    ctx.fillStyle = "#000000";

    ctx.font = "bold 18px sans-serif";
    ctx.fillText("往 金鐘站(東)", 110, 125);
    ctx.font = "13px sans-serif"; ctx.fillStyle = "#666666";
    ctx.fillText("小瀝源路草地滾球場", 110, 143);
    ctx.fillStyle = "#000000";

    // 680 到站時間 (大字 + 城巴 Tag)
    const drawEta = (num, y) => {
      ctx.font = "bold 28px sans-serif";
      ctx.fillText(num, 20, y);
      ctx.font = "16px sans-serif";
      ctx.fillText("分鐘", 45, y - 2);

      // 城巴小框
      ctx.strokeRect(210, y - 22, 45, 24);
      ctx.font = "13px sans-serif";
      ctx.fillText("城巴", 218, y - 5);
    };

    drawEta("7", 190);
    drawEta("27", 240);
    drawEta("47", 290);

    // 虛線分隔線
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(20, 205); ctx.lineTo(255, 205); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(20, 255); ctx.lineTo(255, 255); ctx.stroke();
    ctx.setLineDash([]); // 恢復實線

    // 中間垂直線
    ctx.lineWidth = 1; ctx.strokeStyle = "#ddd";
    ctx.beginPath(); ctx.moveTo(270, 110); ctx.lineTo(270, 300); ctx.stroke();
    ctx.strokeStyle = "#000";

    // 682B 路線
    ctx.fillRect(280, 110, 100, 38);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 26px sans-serif";
    ctx.fillText("682B", 290, 138);
    ctx.fillStyle = "#000000";

    ctx.font = "bold 18px sans-serif";
    ctx.fillText("往 柴灣(東)", 390, 125);
    ctx.font = "13px sans-serif"; ctx.fillStyle = "#666666";
    ctx.fillText("第一城站，插桅杆街", 390, 143);
    ctx.fillStyle = "#000000";

    ctx.font = "16px sans-serif"; ctx.fillStyle = "#888888";
    ctx.fillText("非服務時間 / 暫無班次", 340, 210);
    ctx.fillStyle = "#000000";

    // 主橫向分隔線
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(20, 325); ctx.lineTo(540, 325); ctx.stroke();

    // ---------------- 右上：食品過期清單 ----------------
    ctx.font = "bold 18px sans-serif";
    ctx.fillText("🥑 食品過期清單", 570, 90);

    const drawFood = (name, days, x, y) => {
      ctx.font = "18px sans-serif";
      ctx.fillText(name, x, y);
      // 黑底白字 Tag
      ctx.fillRect(x + 150, y - 20, 60, 26);
      ctx.fillStyle = "#ffffff";
      ctx.font = "14px sans-serif";
      ctx.fillText(days, x + 158, y - 2);
      ctx.fillStyle = "#000000";
    };

    drawFood("節瓜", "剩 2 天", 570, 140);
    drawFood("豆腐", "剩 6 天", 780, 140);
    drawFood("火腿", "剩 13 天", 570, 190);
    drawFood("雞蛋", "剩 69 天", 780, 190);

    // 虛線
    ctx.setLineDash([3, 3]); ctx.lineWidth = 1; ctx.strokeStyle = "#ccc";
    ctx.beginPath(); ctx.moveTo(570, 160); ctx.lineTo(940, 160); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(570, 210); ctx.lineTo(940, 210); ctx.stroke();
    ctx.setLineDash([]); ctx.strokeStyle = "#000";

    // ---------------- 左下：地區天氣簡報 ----------------
    ctx.font = "bold 18px sans-serif";
    ctx.fillText("⛅ 地區天氣簡報", 20, 370);

    // 太陽 Icon 繪製函數
    const drawSunIcon = (x, y) => {
      ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fillStyle = "#f39c12"; ctx.fill();
      ctx.strokeStyle = "#f39c12"; ctx.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        const angle = (i * Math.PI) / 4;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(angle) * 14, y + Math.sin(angle) * 14);
        ctx.lineTo(x + Math.cos(angle) * 18, y + Math.sin(angle) * 18);
        ctx.stroke();
      }
      ctx.strokeStyle = "#000000"; ctx.fillStyle = "#000000";
    };

    const drawWeather = (city, temp, hum, x) => {
      drawSunIcon(x + 15, 415);
      ctx.font = "bold 18px sans-serif";
      ctx.fillText(city, x + 35, 422);
      ctx.font = "bold 32px sans-serif";
      ctx.fillText(temp, x, 465);
      ctx.font = "18px sans-serif"; ctx.fillText("°C", x + 65, 452);
      ctx.font = "14px sans-serif"; ctx.fillStyle = "#555";
      ctx.fillText(`相對濕度 ${hum}%`, x, 492);
      ctx.fillStyle = "#000";
    };

    drawWeather("沙田", "32.0", "58", 30);
    drawWeather("鰂魚涌", "32.0", "58", 210);
    drawWeather("天后", "32.0", "58", 390);

    // 垂直虛線
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(180, 400); ctx.lineTo(180, 500); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(360, 400); ctx.lineTo(360, 500); ctx.stroke();
    ctx.setLineDash([]);

    // ---------------- 右下：重要事項提醒 ----------------
    ctx.font = "bold 18px sans-serif";
    ctx.fillText("📌 重要事項提醒", 570, 370);

    ctx.font = "bold 18px sans-serif";
    ctx.fillText("買蠔油", 570, 430);
    ctx.fillRect(880, 408, 60, 30);
    ctx.fillStyle = "#ffffff"; ctx.font = "13px sans-serif";
    ctx.fillText("今日到期", 885, 428); ctx.fillStyle = "#000000";

    ctx.font = "bold 18px sans-serif";
    ctx.fillText("續借書", 570, 490);
    ctx.strokeRect(860, 468, 80, 30);
    ctx.font = "13px sans-serif";
    ctx.fillText("14 天後跟進", 865, 488);

    // 虛線
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(570, 450); ctx.lineTo(940, 450); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(570, 510); ctx.lineTo(940, 510); ctx.stroke();
    ctx.setLineDash([]);
  }

  render();
</script>
</body>
</html>
