<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>LilyGo T5 S3 墨水屏 1:1 模擬器 (無頂欄/大字體版)</title>
  <style>
    body {
      background-color: #1a1a1a;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 { margin-bottom: 5px; font-size: 22px; color: #ececec; }
    p { color: #888; font-size: 13px; margin-top: 0; margin-bottom: 15px; }

    /* 模擬 E-Ink 墨水屏實體外框 */
    .epd-frame {
      background-color: #dededc;
      border: 14px solid #111111;
      border-right: 38px solid #111111;
      border-radius: 6px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.7);
      position: relative;
    }

    .epd-frame::after {
      content: "LILYGO®";
      position: absolute;
      right: -30px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      color: #666;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 2px;
    }

    canvas {
      display: block;
      background-color: #e3e3df; /* 墨水屏底色 */
    }

    .controls {
      margin-top: 15px;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    button {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #444; }

    .info-panel {
      background: #000;
      color: #00ff66;
      padding: 8px 16px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <h1>LilyGo T5 S3 純黑白 Dashboard (優化放大版)</h1>
  <p>移除頂欄 | 全面放大內文字體 | 統一 Tag 為白底黑框</p>

  <div class="epd-frame">
    <canvas id="epdCanvas" width="960" height="540"></canvas>
  </div>

  <div class="controls">
    <button onclick="triggerEinkRefresh()">⚡ 模擬墨水屏物理刷屏 (E-Ink Refresh)</button>
    <div class="info-panel" id="coordInfo">X: 0, Y: 0</div>
  </div>

<script>
  const canvas = document.getElementById('epdCanvas');
  const ctx = canvas.getContext('2d');
  const coordInfo = document.getElementById('coordInfo');

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = Math.round(e.clientX - rect.left);
    const y = Math.round(e.clientY - rect.top);
    coordInfo.innerText = `X: ${x}, Y: ${y}`;
  });

  // 100% 純黑白太陽 Icon
  function drawEInKSunIcon(x, y) {
    ctx.strokeStyle = "#000000";
    ctx.fillStyle = "#e3e3df";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.arc(x, y, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    for (let i = 0; i < 8; i++) {
      const angle = (i * Math.PI) / 4;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(angle) * 12, y + Math.sin(angle) * 12);
      ctx.lineTo(x + Math.cos(angle) * 17, y + Math.sin(angle) * 17);
      ctx.stroke();
    }
    ctx.fillStyle = "#000000";
  }

  function drawDashedHLine(x1, x2, y) {
    ctx.setLineDash([3, 3]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = "#000000";
    ctx.beginPath();
    ctx.moveTo(x1, y);
    ctx.lineTo(x2, y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawDashedVLine(x, y1, y2) {
    ctx.setLineDash([3, 3]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = "#000000";
    ctx.beginPath();
    ctx.moveTo(x, y1);
    ctx.lineTo(x, y2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function renderEInKDashboard() {
    ctx.fillStyle = '#e3e3df';
    ctx.fillRect(0, 0, 960, 540);
    ctx.fillStyle = '#000000';
    ctx.strokeStyle = '#000000';

    // ---------------------------------------------------------
    // ----------------【左上】🚌 巴士實時到站 (ETA) ----------------
    // ---------------------------------------------------------
    ctx.font = "bold 20px sans-serif";
    ctx.fillText("巴士實時到站 (ETA)", 20, 38);

    // 680 標牌
    ctx.fillRect(20, 55, 66, 32);
    ctx.fillStyle = "#e3e3df";
    ctx.font = "bold 24px sans-serif";
    ctx.fillText("680", 28, 80);
    ctx.fillStyle = "#000000";

    ctx.font = "bold 17px sans-serif";
    ctx.fillText("往 金鐘站(東)", 96, 70);
    ctx.font = "14px sans-serif";
    ctx.fillText("小瀝源路草地滾球場", 96, 88);

    // 到站時間行 (加大數字 & 拉開 X 軸防止字體重疊)
    const drawEtaRow = (num, y) => {
      ctx.font = "bold 32px sans-serif";
      ctx.fillText(num, 20, y);
      
      // 動態計算「分鐘」的 X 座標，避免個位數與雙位數重疊
      const minX = num.length > 1 ? 62 : 42;
      ctx.font = "16px sans-serif";
      ctx.fillText("分鐘", minX, y - 2);

      // 城巴 Tag
      ctx.lineWidth = 1;
      ctx.strokeRect(200, y - 20, 36, 22);
      ctx.font = "12px sans-serif";
      ctx.fillText("城巴", 205, y - 4);
    };

    drawEtaRow("3", 132);
    drawDashedHLine(20, 236, 148);
    drawEtaRow("22", 182);
    drawDashedHLine(20, 236, 198);
    drawEtaRow("42", 232);

    // 分隔 680 / 682B 垂直線
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(250, 55); ctx.lineTo(250, 240); ctx.stroke();

    // 682B 標牌
    ctx.fillRect(270, 55, 80, 32);
    ctx.fillStyle = "#e3e3df";
    ctx.font = "bold 24px sans-serif";
    ctx.fillText("682B", 276, 80);
    ctx.fillStyle = "#000000";

    ctx.font = "bold 17px sans-serif";
    ctx.fillText("往 柴灣(東)", 360, 70);
    ctx.font = "14px sans-serif";
    ctx.fillText("第一城站，插桅杆街", 360, 88);

    ctx.font = "16px sans-serif";
    ctx.fillText("非服務時間 / 暫無班次", 320, 155);

    // 主橫線 (Y = 265，整體上移)
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(20, 265); ctx.lineTo(510, 265); ctx.stroke();

    // ---------------------------------------------------------
    // ----------------【右上】🥑 食品過期清單 ----------------
    // ---------------------------------------------------------
    ctx.font = "bold 20px sans-serif";
    ctx.fillText("食品過期清單", 535, 38);

    // 節瓜 (取消黑底反白 -> 統一改為白底黑框 Tag)
    ctx.font = "bold 18px sans-serif";
    ctx.fillText("節瓜", 535, 85);
    ctx.strokeRect(670, 66, 60, 26);
    ctx.font = "14px sans-serif";
    ctx.fillText("剩 2 天", 676, 84);

    // 豆腐
    ctx.font = "bold 18px sans-serif";
    ctx.fillText("豆腐", 750, 85);
    ctx.strokeRect(875, 66, 60, 26);
    ctx.font = "14px sans-serif";
    ctx.fillText("剩 6 天", 881, 84);

    drawDashedHLine(535, 935, 108);

    // 火腿
    ctx.font = "bold 18px sans-serif";
    ctx.fillText("火腿", 535, 142);
    ctx.strokeRect(662, 123, 68, 26);
    ctx.font = "14px sans-serif";
    ctx.fillText("剩 13 天", 667, 141);

    // 雞蛋
    ctx.font = "bold 18px sans-serif";
    ctx.fillText("雞蛋", 750, 142);
    ctx.strokeRect(867, 123, 68, 26);
    ctx.font = "14px sans-serif";
    ctx.fillText("剩 69 天", 872, 141);

    drawDashedHLine(535, 935, 165);

    // 右側主橫線 (Y = 265)
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(535, 265); ctx.lineTo(935, 265); ctx.stroke();

    // ---------------------------------------------------------
    // ----------------【左下】⛅ 地區天氣簡報 ----------------
    // ---------------------------------------------------------
    ctx.font = "bold 20px sans-serif";
    ctx.fillText("地區天氣簡報", 20, 305);

    const drawWeatherCol = (city, temp, hum, x) => {
      drawEInKSunIcon(x + 12, 348);
      ctx.font = "bold 18px sans-serif";
      ctx.fillText(city, x + 32, 354);

      ctx.font = "bold 34px sans-serif";
      ctx.fillText(temp, x, 408);
      ctx.font = "18px sans-serif"; ctx.fillText("°C", x + 72, 392);

      ctx.font = "14px sans-serif";
      ctx.fillText(`相對濕度 ${hum}%`, x, 436);
    };

    drawWeatherCol("沙田", "32.0", "58", 20);
    drawDashedVLine(170, 335, 450);

    drawWeatherCol("鰂魚涌", "32.0", "58", 195);
    drawDashedVLine(340, 335, 450);

    drawWeatherCol("天后", "32.0", "58", 365);

    // ---------------------------------------------------------
    // ----------------【右下】📌 重要事項提醒 ----------------
    // ---------------------------------------------------------
    ctx.font = "bold 20px sans-serif";
    ctx.fillText("重要事項提醒", 535, 305);

    // 買蠔油 (取消黑底反白 -> 統一白底黑框 Tag)
    ctx.font = "bold 18px sans-serif";
    ctx.fillText("買蠔油", 535, 360);
    ctx.strokeRect(855, 340, 80, 26);
    ctx.font = "14px sans-serif";
    ctx.fillText("今日到期", 863, 358);

    drawDashedHLine(535, 935, 388);

    // 續借書
    ctx.font = "bold 18px sans-serif";
    ctx.fillText("續借書", 535, 422);
    ctx.strokeRect(835, 402, 100, 26);
    ctx.font = "14px sans-serif";
    ctx.fillText("14 天後跟進", 843, 420);

    drawDashedHLine(535, 935, 450);
  }

  function triggerEinkRefresh() {
    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, 960, 540);
    setTimeout(() => {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, 960, 540);
      setTimeout(() => {
        renderEInKDashboard();
      }, 150);
    }, 150);
  }

  renderEInKDashboard();
</script>

</body>
</html>
