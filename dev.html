<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Dashboard</title>
    
    <!-- PWA / iOS Web App 設定 -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dashboard">

    <!-- 載入 Google 現代無襯線字型 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700;900&family=Roboto:wght@700;900&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans HK', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #eef0f2;
            padding: 20px 10px;
            color: #111;
        }

        /* 主容器 */
        .dashboard {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #fff;
            padding: 28px;
            border: 2px solid #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* 頁眉 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 3px solid #111;
            padding-bottom: 12px;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0px;
            color: #111;
        }

        .header .last-updated {
            font-size: 13px;
            font-weight: 500;
            color: #666;
            letter-spacing: 0.5px;
        }

        .header .last-updated span {
            font-weight: 700;
            color: #000;
        }

        /* 網格重構：改為 2x2 對齊矩陣，確保同一列高度 100% 一致 */
        .main-grid {
            display: grid;
            grid-template-columns: 1.25fr 1fr;
            gap: 24px 28px; /* 列間距 24px，欄間距 28px */
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        /* 區塊容器：高度彈性拉伸 (Stretch) */
        .section-box {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100%; /* 強制填滿同一 Row 的高度 */
        }

        /* 第一列 (Row 1) 下方加入深灰分隔線 */
        .row-1 {
            padding-bottom: 24px;
            border-bottom: 2px solid #555;
        }

        @media (max-width: 768px) {
            .row-1 {
                padding-bottom: 20px;
            }
            .row-1.left-item {
                border-bottom: 2px solid #555; /* 手機版維護分隔 */
            }
        }

        /* 區塊標題 */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1px;
            color: #000;
            margin-bottom: 16px; /* 垂直 White Space 16px 保持一致 */
            padding-bottom: 0;
            border-bottom: none;
        }

        .section-body {
            padding: 0;
            flex-grow: 1; /* 內部自動垂直撐滿 */
        }

        /* 載入中狀態 */
        .loading-state {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            font-size: 13px;
            font-weight: 500;
            color: #888;
            letter-spacing: 1px;
            grid-column: 1 / -1;
        }

        /* 🚌 巴士雙欄並排容器 */
        .bus-split-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 480px) {
            .bus-split-container {
                grid-template-columns: 1fr;
                gap: 24px;
            }
        }

        /* 單一巴士欄位 */
        .bus-column {
            border-right: 1px solid #e0e0e0;
            padding-right: 16px;
        }

        .bus-column:last-child {
            border-right: none;
            padding-right: 0;
        }

        /* 路線編號 Header */
        .bus-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 0;
            border-bottom: none;
        }

        .bus-number {
            font-family: 'Roboto', 'Noto Sans HK', sans-serif;
            background-color: #111;
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            padding: 4px 8px;
            border-radius: 2px;
            letter-spacing: 0.5px;
            line-height: 1;
            flex-shrink: 0;
        }

        .bus-header-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .bus-dest {
            font-size: 14px;
            font-weight: 700;
            color: #111;
            line-height: 1.2;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .bus-stop {
            font-size: 11px;
            color: #777;
            font-weight: 500;
            margin-top: 2px;
            line-height: 1.2;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        /* ETA 班次垂直清單 */
        .eta-list {
            display: flex;
            flex-direction: column;
        }

        /* 每班車列 */
        .eta-row {
            font-family: 'Roboto', 'Noto Sans HK', sans-serif;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #d5d5d5;
        }

        .eta-row:last-child {
            border-bottom: none;
        }

        /* 第一班車 (巨型數字) */
        .eta-row-first .eta-min {
            font-size: 32px;
            font-weight: 900;
            color: #000;
            line-height: 1;
            letter-spacing: -1px;
        }

        .eta-row-first .unit {
            font-size: 13px;
            font-weight: 700;
            color: #444;
            margin-left: 2px;
        }

        /* 次班車 (第二、三班) */
        .eta-row-sub .eta-min {
            font-size: 18px;
            font-weight: 900;
            color: #333;
            line-height: 1;
        }

        .eta-row-sub .unit {
            font-size: 12px;
            color: #777;
            margin-left: 2px;
        }

        .co-badge {
            font-size: 10px;
            font-weight: 900;
            border: 1px solid #111;
            padding: 1px 5px;
            border-radius: 2px;
            background-color: #fff;
            color: #111;
            margin-left: auto;
        }

        /* 天氣網格 */
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: left;
            padding: 0;
        }

        .weather-col {
            border-right: 1px dashed #d5d5d5;
            padding: 0 8px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .weather-col:last-child {
            border-right: none;
        }

        .weather-header-line {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .weather-icon {
            font-size: 20px;
            line-height: 1;
        }

        .weather-location {
            font-size: 13px;
            font-weight: 900;
            color: #111;
            letter-spacing: 0.5px;
        }

        .weather-temp {
            font-family: 'Roboto', 'Noto Sans HK', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: #000;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 4px;
        }

        .weather-temp .unit {
            font-size: 14px;
            font-weight: 700;
            color: #555;
        }

        .weather-rh {
            font-size: 11px;
            font-weight: 500;
            color: #666;
        }

        .weather-rh span {
            font-weight: 700;
            color: #111;
        }

        /* 🥑 食品清單 2 COLUMN 網格佈局 */
        .food-grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0 20px;
        }

        @media (max-width: 480px) {
            .food-grid-container {
                grid-template-columns: 1fr;
            }
        }

        .food-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #d5d5d5;
        }

        .food-grid-container .food-item:nth-child(odd) {
            padding-right: 0;
            border-right: none;
        }

        .food-grid-container .food-item:nth-child(even) {
            padding-left: 0;
        }

        .food-name {
            font-size: 13px;
            font-weight: 700;
            color: #111;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }

        .food-badge {
            border: 1px solid #111;
            padding: 1px 6px;
            font-size: 11px;
            font-weight: 700;
            background-color: #fff;
            color: #111;
            white-space: nowrap;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        .food-badge.urgent {
            background-color: #111;
            color: #fff;
        }

        /* 📌 提醒事項單欄清單 */
        .remind-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #d5d5d5;
        }

        .remind-item:last-child {
            border-bottom: none;
        }

        .remind-title {
            font-size: 14px;
            font-weight: 700;
            color: #111;
            letter-spacing: 0.3px;
        }

        .remind-badge {
            border: 1px solid #111;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 700;
            background-color: #fff;
            color: #111;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .remind-badge.urgent {
            background-color: #111;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- 頁眉：日期顯示 -->
    <div class="header">
        <h1 id="current-date">----年--月--日 (星期-)</h1>
        <div class="last-updated">最後更新 <span id="updated-at">--:--</span></div>
    </div>

    <!-- 主網格：改為 2x2 排列，確保每一列左右 Module 高度自動拉伸對齊 -->
    <div class="main-grid">
        
        <!-- 【Row 1 左】巴士實時到站 -->
        <div class="section-box row-1 left-item">
            <div class="section-header">
                <span>🚌 巴士實時到站 (ETA)</span>
            </div>
            <div class="section-body">
                <div class="bus-split-container">
                    <!-- 左邊：680 巴士 -->
                    <div class="bus-column">
                        <div class="bus-header">
                            <div class="bus-number">680</div>
                            <div class="bus-header-info">
                                <div class="bus-dest">往 金鐘站(東)</div>
                                <div class="bus-stop">小瀝源路草地滾球場</div>
                            </div>
                        </div>
                        <div class="eta-list" id="eta-680">
                            <div class="loading-state">載入中...</div>
                        </div>
                    </div>

                    <!-- 右邊：682B 巴士 -->
                    <div class="bus-column">
                        <div class="bus-header">
                            <div class="bus-number">682B</div>
                            <div class="bus-header-info">
                                <div class="bus-dest">往 柴灣(東)</div>
                                <div class="bus-stop">第一城站，插桅杆街</div>
                            </div>
                        </div>
                        <div class="eta-list" id="eta-682B">
                            <div class="loading-state">載入中...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 【Row 1 右】食品過期清單 (高度與巴士 Module 永遠對齊) -->
        <div class="section-box row-1">
            <div class="section-header">
                <span>🥑 食品過期清單</span>
            </div>
            <div class="section-body">
                <div class="food-grid-container" id="food-list-container">
                    <div class="loading-state">載入中...</div>
                </div>
            </div>
        </div>

        <!-- 【Row 2 左】地區天氣簡報 -->
        <div class="section-box">
            <div class="section-header">
                <span>⛅ 地區天氣簡報</span>
            </div>
            <div class="section-body">
                <div class="weather-grid">
                    <!-- 沙田 -->
                    <div class="weather-col">
                        <div class="weather-header-line">
                            <span class="weather-icon" id="shatin-icon">☀️</span>
                            <span class="weather-location">沙田</span>
                        </div>
                        <div class="weather-temp"><span id="shatin-temp">--</span><span class="unit">°C</span></div>
                        <div class="weather-rh">相對濕度 <span id="shatin-rh">--</span>%</div>
                    </div>

                    <!-- 鰂魚涌 -->
                    <div class="weather-col">
                        <div class="weather-header-line">
                            <span class="weather-icon" id="quarry-icon">☀️</span>
                            <span class="weather-location">鰂魚涌</span>
                        </div>
                        <div class="weather-temp"><span id="quarry-temp">--</span><span class="unit">°C</span></div>
                        <div class="weather-rh">相對濕度 <span id="quarry-rh">--</span>%</div>
                    </div>

                    <!-- 天后 -->
                    <div class="weather-col">
                        <div class="weather-header-line">
                            <span class="weather-icon" id="tinhau-icon">☀️</span>
                            <span class="weather-location">天后</span>
                        </div>
                        <div class="weather-temp"><span id="tinhau-temp">--</span><span class="unit">°C</span></div>
                        <div class="weather-rh">相對濕度 <span id="tinhau-rh">--</span>%</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 【Row 2 右】重要事項提醒 -->
        <div class="section-box">
            <div class="section-header">
                <span>📌 重要事項提醒</span>
            </div>
            <div class="section-body" id="remind-list-container">
                <div class="loading-state">載入中...</div>
            </div>
        </div>

    </div>
</div>

<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzuU7dE0AE-loLmJLL1dvQAhTvxI4X9jzcqsgsen42evVE-s71qZvAGntU66sUUUBrO/exec";

    // 更新日期顯示
    function updateHeaderDate() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        
        const weekDays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        const dayOfWeek = weekDays[now.getDay()];

        document.getElementById("current-date").textContent = `${year}年${month}月${date}日 (${dayOfWeek})`;
    }

    async function fetchDashboardData() {
        try {
            updateHeaderDate();

            const cacheBuster = "?t=" + new Date().getTime();
            const response = await fetch(GAS_API_URL + cacheBuster, { redirect: "follow" });
            const data = await response.json();

            console.log("從 GAS 接收到的完整 JSON 資料:", data);

            if (data.status === "success" || data.bus || data.weather) {
                // 1. 更新最後更新時間
                document.getElementById("updated-at").textContent = data.updated_at || new Date().toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' });

                // 2. 渲染巴士 ETA
                if (data.bus) {
                    const eta680 = data.bus["680"] || data.bus.bus_680;
                    const eta682B = data.bus["682B"] || data.bus.bus_682B;
                    
                    renderBusEta("eta-680", eta680);
                    renderBusEta("eta-682B", eta682B);
                }

                // 3. 渲染地區天氣
                if (data.weather) {
                    renderWeather("shatin", data.weather.shatin);
                    renderWeather("quarry", data.weather.quarry_bay);
                    renderWeather("tinhau", data.weather.tin_hau);
                }

                // 4. 渲染食物清單
                if (data.food) {
                    renderFoodList(data.food);
                }

                // 5. 渲染提醒事項
                const remindData = (data.remind && data.remind.length > 0) ? data.remind : (data.all_remind || []);
                renderRemind(remindData);
            } else {
                console.warn("GAS 回傳的資料結構不符預期:", data);
            }
        } catch (error) {
            console.error("抓取 Dashboard 資料失敗:", error);
            document.getElementById("eta-680").innerHTML = `<div class="loading-state" style="color:red;">載入失敗 (請檢查網絡)</div>`;
            document.getElementById("eta-682B").innerHTML = `<div class="loading-state" style="color:red;">載入失敗 (請檢查網絡)</div>`;
        }
    }

    // 渲染巴士 ETA
    function renderBusEta(elementId, etaArray) {
        const container = document.getElementById(elementId);

        if (!etaArray || !Array.isArray(etaArray) || etaArray.length === 0) {
            container.innerHTML = `<div class="loading-state">非服務時間 / 暫無班次</div>`;
            return;
        }

        let html = "";
        let validItemCount = 0;

        etaArray.forEach((item) => {
            if (validItemCount >= 3) return; // 最多顯示 3 班車

            let coBadge = "";
            let minutes = item;

            if (typeof item === 'object' && item !== null) {
                minutes = item.min;
                if (item.co) {
                    coBadge = `<span class="co-badge">${item.co}</span>`;
                }
            }

            if (minutes < 0 || minutes === null || minutes === undefined) return;

            const rowClass = (validItemCount === 0) ? "eta-row eta-row-first" : "eta-row eta-row-sub";

            html += `
                <div class="${rowClass}">
                    <div><span class="eta-min">${minutes}</span><span class="unit">分鐘</span></div>
                    ${coBadge}
                </div>
            `;
            validItemCount++;
        });

        if (validItemCount === 0) {
            html = `<div class="loading-state">非服務時間 / 暫無班次</div>`;
        }

        container.innerHTML = html;
    }

    // 渲染天氣資訊
    function renderWeather(prefix, weatherObj) {
        if (!weatherObj) return;
        document.getElementById(`${prefix}-temp`).textContent = weatherObj.temp || "--";
        document.getElementById(`${prefix}-rh`).textContent = weatherObj.rh || "--";
        document.getElementById(`${prefix}-icon`).textContent = weatherObj.icon || "☀️";
    }

    // 渲染食品清單
    function renderFoodList(foodArray) {
        const container = document.getElementById("food-list-container");

        if (!foodArray || foodArray.length === 0) {
            container.innerHTML = `<div class="loading-state">🎉 目前沒有即將過期的食物！</div>`;
            return;
        }

        let html = "";
        foodArray.forEach(item => {
            const isUrgent = item.days_left <= 3;
            const badgeClass = isUrgent ? "food-badge urgent" : "food-badge";
            
            let daysText = "";
            if (item.days_left < 0) {
                daysText = `已過期 ${Math.abs(item.days_left)} 天`;
            } else if (item.days_left === 0) {
                daysText = `今日到期`;
            } else {
                daysText = `剩 ${item.days_left} 天`;
            }

            html += `
                <div class="food-item">
                    <span class="food-name">${escapeHtml(item.name || '')}</span>
                    <span class="${badgeClass}">${daysText}</span>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // 渲染提醒事項
    function renderRemind(remindData) {
        const container = document.getElementById("remind-list-container");

        if (!remindData || !Array.isArray(remindData) || remindData.length === 0) {
            container.innerHTML = `<div class="loading-state">🎉 暫時沒有需要跟進的事項</div>`;
            return;
        }

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        let html = "";
        remindData.forEach(item => {
            let daysLeft = item.days_left;
            const dueDateRaw = item.due_date || item.due || item.rawDueDate;

            if (daysLeft === undefined || daysLeft === null || isNaN(daysLeft)) {
                if (dueDateRaw) {
                    let cleanStr = String(dueDateRaw).split("T")[0]; 
                    const dueDate = new Date(cleanStr.replace(/-/g, "/"));
                    
                    if (!isNaN(dueDate.getTime())) {
                        dueDate.setHours(0, 0, 0, 0);
                        const diffTime = dueDate - today;
                        daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    }
                }
            }

            let statusBadge = "";
            let isUrgent = daysLeft <= 3;
            let badgeClass = isUrgent ? "remind-badge urgent" : "remind-badge";

            if (daysLeft === undefined || daysLeft === null || isNaN(daysLeft)) {
                statusBadge = dueDateRaw || "待處理";
            } else if (daysLeft < 0) {
                statusBadge = `已逾期 ${Math.abs(daysLeft)} 天`;
            } else if (daysLeft === 0) {
                statusBadge = "今日到期";
            } else {
                statusBadge = `${daysLeft} 天後跟進`;
            }

            const titleText = item.title || item.name || "未命名事項";

            html += `
                <div class="remind-item">
                    <span class="remind-title">${escapeHtml(titleText)}</span>
                    <span class="${badgeClass}">${statusBadge}</span>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // 防 XSS 轉義函數
    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    // 初始化頁面與定時刷新
    updateHeaderDate();
    fetchDashboardData();
    setInterval(fetchDashboardData, 60000);
</script>

</body>
</html>
