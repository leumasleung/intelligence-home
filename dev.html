<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Dashboard</title>
    
    <!-- PWA / iOS Web App 設定 -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dashboard">

    <style>
        /* 
         * Typography & JR-Style Design Inspired by image_b68c3b.jpg
         * Key elements: High contrast, clean sans-serif (similar to Frutiger/Helvetica), 
         * distinct visual hierarchy, strong use of borders for separation, and precise alignment.
         */
        
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Use a clean, modern sans-serif stack prioritized for legibility, similar to JR signage */
            font-family: 'Noto Sans HK', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: #e8e8e8; /* Slightly darker gray to make the white panels pop */
            padding: 20px;
            color: #1a1a1a; /* Off-black for better readability than pure black */
        }

        /* 儀表板主容器 */
        .dashboard {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #fff;
            /* Remove heavy drop shadow, use a subtle modern shadow and rounded corners */
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            overflow: hidden; /* Ensure headers don't spill over rounded corners */
            border: 1px solid #ccc;
        }

        /* 頂部標題列 (JR Style Header) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end; /* Align baselines */
            padding: 20px 24px 16px;
            background-color: #fff;
            border-bottom: 4px solid #4CAF50; /* JR Yamanote Green accent line */
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 0.5px;
            color: #222;
        }

        .header .last-updated {
            font-size: 14px;
            font-weight: 700;
            color: #666;
            margin-bottom: 4px; /* Align slightly above the h1 baseline */
        }

        /* 主網格佈局 */
        .main-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr; /* Slightly adjust ratio for better balance */
            gap: 0; /* Remove gap, use borders for separation like JR panels */
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .left-column {
            border-right: 1px solid #ddd;
        }

        @media (max-width: 768px) {
            .left-column {
                border-right: none;
                border-bottom: 1px solid #ddd;
            }
        }

        /* 區塊容器 */
        .section-box {
            /* Remove individual borders, handle separation in grid layout */
            margin-bottom: 0;
            border-bottom: 1px solid #ddd;
        }
        
        .section-box:last-child {
             border-bottom: none;
        }

        .section-header {
            background-color: #f8f9fa; /* Light gray background instead of harsh black */
            color: #333;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #eee;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-body {
            padding: 24px;
        }

        /* 統一所有「載入中...」與「無資料」狀態的樣式 */
        .loading-state {
            width: 100%;
            text-align: center;
            padding: 24px 0;
            font-size: 15px;
            font-weight: 700;
            color: #888;
        }

        /* 巴士卡片 (JR Transfer Info Style) */
        .bus-card {
            border: none;
            padding: 0 0 20px 0;
            margin-bottom: 20px;
            background-color: #fff;
            border-bottom: 1px dashed #ddd;
        }

        .bus-card:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .bus-header {
            display: flex;
            justify-content: flex-start;
            align-items: baseline;
            margin-bottom: 12px;
            gap: 16px;
        }

        /* JR Line Indicator Style */
        .bus-number {
            font-size: 24px;
            font-weight: 900;
            background-color: #1976D2; /* JR Blue */
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            display: inline-block;
            min-width: 70px;
            text-align: center;
        }

        /* Destination Text Style */
        .bus-dest {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }
        
        .bus-dest::after {
            content: " 行"; /* Append "Bound for" in Japanese style, adjust as needed */
            font-size: 14px;
            color: #777;
            font-weight: normal;
            margin-left: 4px;
        }

        .bus-stop {
            font-size: 13px;
            color: #777;
            font-weight: 700;
            margin-left: auto; /* Push to the right */
        }

        .eta-container {
            background-color: transparent; /* Remove gray box */
            padding: 0 0 0 86px; /* Align with destination text (70px box + 16px gap) */
            min-height: auto;
            display: flex;
            align-items: baseline;
            justify-content: flex-start;
            flex-wrap: wrap;
            gap: 12px;
        }

        .eta-main {
            font-size: 28px;
            font-weight: 900;
            color: #d32f2f; /* Highlight ETA in red */
        }
        
        .eta-main::after {
             content: " 分";
             font-size: 16px;
             font-weight: 700;
             color: #555;
        }

        .eta-sub {
            font-size: 18px;
            font-weight: 700;
            color: #666;
        }
        
        .eta-sub::before {
            content: "次発 "; /* "Next departure" */
            font-size: 12px;
            color: #999;
        }

        .co-badge {
            font-size: 11px;
            font-weight: 800;
            border: 1px solid #ccc;
            padding: 2px 6px;
            border-radius: 4px;
            background-color: #f4f4f4;
            color: #555;
            margin-right: 6px;
            vertical-align: middle;
        }

        /* 天氣網格 */
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0; /* Use borders */
            text-align: center;
            padding: 0;
        }

        .weather-col {
            border-right: 1px solid #eee;
            padding: 16px 8px;
        }

        .weather-col:last-child {
            border-right: none;
        }

        .weather-location {
            font-size: 14px;
            font-weight: 900;
            color: #555;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .weather-icon {
            font-size: 32px;
            margin: 8px 0;
        }

        .weather-temp {
            font-size: 24px;
            font-weight: 900;
            color: #222;
        }

        .weather-rh {
            font-size: 12px;
            color: #777;
            margin-top: 6px;
            font-weight: 700;
        }

        /* 食品過期清單 & 提醒清單項目 */
        .list-container {
             /* Remove padding from section-body and apply here for lists */
             padding: 0 24px;
        }

        .food-item, .remind-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #eee;
        }

        .food-item:last-child, .remind-item:last-child {
            border-bottom: none;
        }

        .food-name, .remind-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }

        /* Badge Style - Refined for contrast */
        .food-badge, .remind-badge {
            border: none;
            padding: 4px 10px;
            border-radius: 12px; /* Pill shape */
            font-size: 13px;
            font-weight: 900;
            background-color: #f0f0f0;
            color: #555;
            white-space: nowrap;
        }

        .food-badge.urgent, .remind-badge.urgent {
            background-color: #d32f2f; /* Red for urgent */
            color: #fff;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- 頁眉：日期顯示 -->
    <div class="header">
        <h1 id="current-date">----年--月--日 (星期-)</h1>
        <div class="last-updated">最後更新: <span id="updated-at">--:--</span></div>
    </div>

    <!-- 主內容區塊 -->
    <div class="main-grid">
        
        <!-- 左欄：巴士 ETA & 地區天氣 -->
        <div class="left-column">
            
            <!-- 巴士實時到站 -->
            <div class="section-box">
                <div class="section-header">
                    <span>🚌 巴士實時到站 (ETA)</span>
                </div>
                <div class="section-body">
                    
                    <!-- 680 巴士 -->
                    <div class="bus-card">
                        <div class="bus-header">
                            <span class="bus-number">680</span>
                            <div class="bus-dest">金鐘站(東)</div>
                            <div class="bus-stop">小瀝源路草地滾球場</div>
                        </div>
                        <div class="eta-container" id="eta-680">
                            <div class="loading-state">載入中...</div>
                        </div>
                    </div>

                    <!-- 682B 巴士 -->
                    <div class="bus-card">
                        <div class="bus-header">
                            <span class="bus-number" style="background-color: #F57C00;">682B</span> <!-- Different color for different line -->
                            <div class="bus-dest">柴灣(東)</div>
                            <div class="bus-stop">第一城站，插桅杆街</div>
                        </div>
                        <div class="eta-container" id="eta-682B">
                            <div class="loading-state">載入中...</div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- 地區天氣簡報 -->
            <div class="section-box">
                <div class="section-header">
                    <span>⛅ 地區天氣簡報</span>
                </div>
                <div class="section-body" style="padding: 0;"> <!-- Remove padding for edge-to-edge grid -->
                    <div class="weather-grid">
                        
                        <!-- 沙田 -->
                        <div class="weather-col">
                            <div class="weather-location">沙田</div>
                            <div class="weather-icon" id="shatin-icon">☀️</div>
                            <div class="weather-temp"><span id="shatin-temp">--</span>°C</div>
                            <div class="weather-rh">相對濕度 <span id="shatin-rh">--</span>%</div>
                        </div>

                        <!-- 鰂魚涌 -->
                        <div class="weather-col">
                            <div class="weather-location">鰂魚涌</div>
                            <div class="weather-icon" id="quarry-icon">☀️</div>
                            <div class="weather-temp"><span id="quarry-temp">--</span>°C</div>
                            <div class="weather-rh">相對濕度 <span id="quarry-rh">--</span>%</div>
                        </div>

                        <!-- 天后 -->
                        <div class="weather-col">
                            <div class="weather-location">天后</div>
                            <div class="weather-icon" id="tinhau-icon">☀️</div>
                            <div class="weather-temp"><span id="tinhau-temp">--</span>°C</div>
                            <div class="weather-rh">相對濕度 <span id="tinhau-rh">--</span>%</div>
                        </div>

                    </div>
                </div>
            </div>

        </div>

        <!-- 右欄：食品過期清單 + 重要事項提醒 -->
        <div class="right-column">
            
            <!-- 上：食品過期清單 -->
            <div class="section-box">
                <div class="section-header">
                    <span>🥑 食品過期清單</span>
                </div>
                <div class="section-body list-container" id="food-list-container">
                    <div class="loading-state">載入中...</div>
                </div>
            </div>

            <!-- 下：重要事項提醒 -->
            <div class="section-box">
                <div class="section-header">
                    <span>📌 重要事項提醒</span>
                </div>
                <div class="section-body list-container" id="remind-list-container">
                    <div class="loading-state">載入中...</div>
                </div>
            </div>

        </div>

    </div>
</div>

<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzuU7dE0AE-loLmJLL1dvQAhTvxI4X9jzcqsgsen42evVE-s71qZvAGntU66sUUUBrO/exec";

    // 更新日期顯示
    function updateHeaderDate() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        
        const weekDays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        const dayOfWeek = weekDays[now.getDay()];

        document.getElementById("current-date").textContent = `${year}年${month}月${date}日 (${dayOfWeek})`;
    }

    async function fetchDashboardData() {
        try {
            updateHeaderDate();

            const cacheBuster = "?t=" + new Date().getTime();
            const response = await fetch(GAS_API_URL + cacheBuster, { redirect: "follow" });
            const data = await response.json();

            console.log("從 GAS 接收到的完整 JSON 資料:", data);

            if (data.status === "success" || data.bus || data.weather) {
                // 1. 更新最後更新時間
                document.getElementById("updated-at").textContent = data.updated_at || new Date().toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' });

                // 2. 渲染巴士 ETA
                if (data.bus) {
                    const eta680 = data.bus["680"] || data.bus.bus_680;
                    const eta682B = data.bus["682B"] || data.bus.bus_682B;
                    
                    renderBusEta("eta-680", eta680);
                    renderBusEta("eta-682B", eta682B);
                }

                // 3. 渲染地區天氣
                if (data.weather) {
                    renderWeather("shatin", data.weather.shatin);
                    renderWeather("quarry", data.weather.quarry_bay);
                    renderWeather("tinhau", data.weather.tin_hau);
                }

                // 4. 渲染食物清單
                if (data.food) {
                    renderFoodList(data.food);
                }

                // 5. 渲染提醒事項
                const remindData = (data.remind && data.remind.length > 0) ? data.remind : (data.all_remind || []);
                renderRemind(remindData);
            } else {
                console.warn("GAS 回傳的資料結構不符預期:", data);
            }
        } catch (error) {
            console.error("抓取 Dashboard 資料失敗:", error);
            document.getElementById("eta-680").innerHTML = `<div class="loading-state" style="color:#d32f2f;">載入失敗 (請檢查網絡)</div>`;
            document.getElementById("eta-682B").innerHTML = `<div class="loading-state" style="color:#d32f2f;">載入失敗 (請檢查網絡)</div>`;
        }
    }

    // 渲染巴士 ETA
    function renderBusEta(elementId, etaArray) {
        const container = document.getElementById(elementId);

        if (!etaArray || !Array.isArray(etaArray) || etaArray.length === 0) {
            container.innerHTML = `<div class="loading-state">非服務時間 / 暫無班次</div>`;
            return;
        }

        let html = "";
        let validItemCount = 0;

        etaArray.forEach((item) => {
            let coBadge = "";
            let minutes = item;

            if (typeof item === 'object' && item !== null) {
                minutes = item.min;
                if (item.co) {
                    coBadge = `<span class="co-badge">${item.co}</span>`;
                }
            }

            if (minutes < 0 || minutes === null || minutes === undefined) return;

            // Updated HTML structure to match new CSS
            if (validItemCount === 0) {
                html += `<span class="eta-main">${coBadge}${minutes}</span>`;
            } else {
                html += `<span class="eta-sub">${coBadge}${minutes}</span>`;
            }
            validItemCount++;
        });

        if (validItemCount === 0) {
            html = `<div class="loading-state">非服務時間 / 暫無班次</div>`;
        }

        container.innerHTML = html;
        container.style.justifyContent = "flex-start"; // 有內容時靠左對齊
    }

    // 渲染天氣資訊
    function renderWeather(prefix, weatherObj) {
        if (!weatherObj) return;
        document.getElementById(`${prefix}-temp`).textContent = weatherObj.temp || "--";
        document.getElementById(`${prefix}-rh`).textContent = weatherObj.rh || "--";
        document.getElementById(`${prefix}-icon`).textContent = weatherObj.icon || "☀️";
    }

    // 渲染食品清單
    function renderFoodList(foodArray) {
        const container = document.getElementById("food-list-container");

        if (!foodArray || foodArray.length === 0) {
            container.innerHTML = `<div class="loading-state">🎉 目前沒有即將過期的食物！</div>`;
            return;
        }

        let html = "";
        foodArray.forEach(item => {
            const isUrgent = item.days_left <= 3;
            const badgeClass = isUrgent ? "food-badge urgent" : "food-badge";
            
            let daysText = "";
            if (item.days_left < 0) {
                daysText = `已過期 ${Math.abs(item.days_left)} 天`;
            } else if (item.days_left === 0) {
                daysText = `今日到期`;
            } else {
                daysText = `剩 ${item.days_left} 天`;
            }

            html += `
                <div class="food-item">
                    <span class="food-name">${escapeHtml(item.name || '')}</span>
                    <span class="${badgeClass}">${daysText}</span>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // 渲染提醒事項 (改為 X 天後跟進)
    function renderRemind(remindData) {
        const container = document.getElementById("remind-list-container");

        if (!remindData || !Array.isArray(remindData) || remindData.length === 0) {
            container.innerHTML = `<div class="loading-state">🎉 暫時沒有需要跟進的事項</div>`;
            return;
        }

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        let html = "";
        remindData.forEach(item => {
            let daysLeft = item.days_left;
            const dueDateRaw = item.due_date || item.due || item.rawDueDate;

            if (daysLeft === undefined || daysLeft === null || isNaN(daysLeft)) {
                if (dueDateRaw) {
                    let cleanStr = String(dueDateRaw).split("T")[0]; 
                    const dueDate = new Date(cleanStr.replace(/-/g, "/"));
                    
                    if (!isNaN(dueDate.getTime())) {
                        dueDate.setHours(0, 0, 0, 0);
                        const diffTime = dueDate - today;
                        daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    }
                }
            }

            let statusBadge = "";
            let isUrgent = daysLeft <= 3;
            let badgeClass = isUrgent ? "remind-badge urgent" : "remind-badge";

            if (daysLeft === undefined || daysLeft === null || isNaN(daysLeft)) {
                statusBadge = dueDateRaw || "待處理";
            } else if (daysLeft < 0) {
                statusBadge = `已逾期 ${Math.abs(daysLeft)} 天`;
            } else if (daysLeft === 0) {
                statusBadge = "今日到期";
            } else {
                // ✅ 改為「X 天後跟進」
                statusBadge = `${daysLeft} 天後跟進`;
            }

            const titleText = item.title || item.name || "未命名事項";

            html += `
                <div class="remind-item">
                    <span class="remind-title">${escapeHtml(titleText)}</span>
                    <span class="${badgeClass}">${statusBadge}</span>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // 防 XSS 轉義函數
    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    // 初始化頁面與定時刷新
    updateHeaderDate();
    fetchDashboardData();
    setInterval(fetchDashboardData, 60000);
</script>

</body>
</html>
