<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            padding: 10px;
            color: #000;
        }

        /* 儀表板主容器 (黑白粗邊框風格) */
        .dashboard {
            max-width: 1000px;
            margin: 0 auto;
            border: 4px solid #000;
            background-color: #fff;
            padding: 16px;
            box-shadow: 6px 6px 0px #000;
        }

        /* 頂部標題列 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #000;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .header .last-updated {
            font-size: 14px;
            font-weight: bold;
        }

        /* 主網格佈局 (左欄: 巴士+天氣, 右欄: 食物清單) */
        .main-grid {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 16px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 區塊容器 */
        .section-box {
            border: 2px solid #000;
            margin-bottom: 16px;
        }

        .section-box:last-child {
            margin-bottom: 0;
        }

        .section-header {
            background-color: #000;
            color: #fff;
            padding: 6px 12px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-body {
            padding: 12px;
        }

        /* 巴士卡片 */
        .bus-card {
            border: 2px solid #000;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            background-color: #fff;
        }

        .bus-card:last-child {
            margin-bottom: 0;
        }

        .bus-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .bus-number {
            font-size: 28px;
            font-weight: 900;
        }

        .bus-dest {
            font-size: 14px;
            font-weight: bold;
        }

        .bus-stop {
            font-size: 12px;
            color: #333;
            text-align: right;
            font-weight: bold;
        }

        .eta-container {
            background-color: #eeeeee;
            border-radius: 4px;
            padding: 10px;
            min-height: 44px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .eta-main {
            font-size: 18px;
            font-weight: bold;
        }

        .eta-sub {
            font-size: 15px;
            font-weight: bold;
            color: #333;
        }

        .co-badge {
            font-size: 11px;
            font-weight: 800;
            border: 1px solid #000;
            padding: 1px 4px;
            border-radius: 3px;
            background-color: #fff;
            margin-right: 4px;
        }

        /* 天氣網格 */
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            text-align: center;
            padding: 8px 0;
        }

        .weather-col {
            border-right: 1px dashed #000;
            padding: 0 4px;
        }

        .weather-col:last-child {
            border-right: none;
        }

        .weather-location {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .weather-icon {
            font-size: 26px;
            margin: 4px 0;
        }

        .weather-temp {
            font-size: 20px;
            font-weight: 900;
        }

        .weather-rh {
            font-size: 12px;
            color: #333;
            margin-top: 4px;
        }

        /* 食物過期清單 */
        .food-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #000;
        }

        .food-item:last-child {
            border-bottom: none;
        }

        .food-name {
            font-size: 16px;
            font-weight: bold;
        }

        .food-badge {
            border: 1px solid #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            background-color: #fff;
        }

        .food-badge.urgent {
            background-color: #000;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- 頁眉：左側改為顯示年月日與星期 -->
    <div class="header">
        <h1 id="current-date">----年--月--日 (星期-)</h1>
        <div class="last-updated">最後更新: <span id="updated-at">--:--</span></div>
    </div>

    <!-- 主內容區塊 -->
    <div class="main-grid">
        
        <!-- 左欄：巴士 ETA & 地區天氣 -->
        <div class="left-column">
            
            <!-- 巴士過海/即時到站 -->
            <div class="section-box">
                <div class="section-header">
                    <span>🚌 巴士實時到站 (ETA)</span>
                </div>
                <div class="section-body">
                    
                    <!-- 680 巴士 -->
                    <div class="bus-card">
                        <div class="bus-header">
                            <div>
                                <span class="bus-number">680</span>
                                <div class="bus-dest">往 金鐘站(東)</div>
                            </div>
                            <div class="bus-stop">小瀝源路草地滾球場</div>
                        </div>
                        <div class="eta-container" id="eta-680">
                            載入中...
                        </div>
                    </div>

                    <!-- 682B 巴士 -->
                    <div class="bus-card">
                        <div class="bus-header">
                            <div>
                                <span class="bus-number">682B</span>
                                <div class="bus-dest">往 柴灣(東)</div>
                            </div>
                            <div class="bus-stop">第一城站，插桅杆街</div>
                        </div>
                        <div class="eta-container" id="eta-682B">
                            載入中...
                        </div>
                    </div>

                </div>
            </div>

            <!-- 地區天氣簡報 -->
            <div class="section-box">
                <div class="section-header">
                    <span>⛅ 地區天氣簡報</span>
                </div>
                <div class="section-body">
                    <div class="weather-grid">
                        
                        <!-- 沙田 -->
                        <div class="weather-col">
                            <div class="weather-location">沙田</div>
                            <div class="weather-icon" id="shatin-icon">☀️</div>
                            <div class="weather-temp"><span id="shatin-temp">--</span>°C</div>
                            <div class="weather-rh">相對濕度 <span id="shatin-rh">--</span>%</div>
                        </div>

                        <!-- 鰂魚涌 (東區) -->
                        <div class="weather-col">
                            <div class="weather-location">鰂魚涌 (東區)</div>
                            <div class="weather-icon" id="quarry-icon">☀️</div>
                            <div class="weather-temp"><span id="quarry-temp">--</span>°C</div>
                            <div class="weather-rh">相對濕度 <span id="quarry-rh">--</span>%</div>
                        </div>

                        <!-- 天后 (中西區) -->
                        <div class="weather-col">
                            <div class="weather-location">天后 (中西區)</div>
                            <div class="weather-icon" id="tinhau-icon">☀️</div>
                            <div class="weather-temp"><span id="tinhau-temp">--</span>°C</div>
                            <div class="weather-rh">相對濕度 <span id="tinhau-rh">--</span>%</div>
                        </div>

                    </div>
                </div>
            </div>

        </div>

        <!-- 右欄：食品過期清單 -->
        <div class="right-column">
            <div class="section-box">
                <div class="section-header">
                    <span>🥑 食品過期清單</span>
                </div>
                <div class="section-body" id="food-list-container">
                    載入中...
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // ⚠️ 請記得替換為你實際部署的 Google Apps Script 網頁應用程式 URL
    const GAS_API_URL = "https://script.google.com/macros/s/YOUR_EXEC_URL_HERE/exec";

    // 更新日期顯示 (格式：2026年7月21日 (星期二))
    function updateHeaderDate() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        
        const weekDays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        const dayOfWeek = weekDays[now.getDay()];

        document.getElementById("current-date").textContent = `${year}年${month}月${date}日 (${dayOfWeek})`;
    }

    async function fetchDashboardData() {
        try {
            // 刷新時順便更新日期
            updateHeaderDate();

            const response = await fetch(GAS_API_URL);
            const data = await response.json();

            if (data.status === "success") {
                // 1. 更新最後更新時間
                document.getElementById("updated-at").textContent = data.updated_at || "--:--";

                // 2. 渲染巴士 ETA
                renderBusEta("eta-680", data.bus.bus_680);
                renderBusEta("eta-682B", data.bus.bus_682B);

                // 3. 渲染地區天氣
                renderWeather("shatin", data.weather.shatin);
                renderWeather("quarry", data.weather.quarry_bay);
                renderWeather("tinhau", data.weather.tin_hau);

                // 4. 渲染食物清單
                renderFoodList(data.food);
            }
        } catch (error) {
            console.error("Fetch Data Error:", error);
        }
    }

    // 渲染巴士 ETA 格式化函式
    function renderBusEta(elementId, etaArray) {
        const container = document.getElementById(elementId);

        if (!etaArray || etaArray.length === 0) {
            container.innerHTML = `<span class="eta-sub" style="color: #666;">非服務時間</span>`;
            return;
        }

        let html = "";
        etaArray.forEach((item, index) => {
            let coBadge = "";
            let minutes = item;

            if (typeof item === 'object' && item !== null) {
                minutes = item.min;
                if (item.co) {
                    let coName = item.co;
                    if (coName === "CTB") coName = "城巴";
                    if (coName === "KMB") coName = "九巴";
                    coBadge = `<span class="co-badge">${coName}</span>`;
                }
            }

            if (minutes < 0) return;

            if (index === 0) {
                html += `<span class="eta-main">${coBadge}${minutes} 分鐘</span>`;
            } else {
                html += `<span class="eta-sub">| ${coBadge}${minutes} 分</span>`;
            }
        });

        if (html === "") {
            html = `<span class="eta-sub" style="color: #666;">非服務時間</span>`;
        }

        container.innerHTML = html;
    }

    // 渲染天氣資訊
    function renderWeather(prefix, weatherObj) {
        if (!weatherObj) return;
        document.getElementById(`${prefix}-temp`).textContent = weatherObj.temp || "--";
        document.getElementById(`${prefix}-rh`).textContent = weatherObj.rh || "--";
        document.getElementById(`${prefix}-icon`).textContent = weatherObj.icon || "☀️";
    }

    // 渲染食品清單
    function renderFoodList(foodArray) {
        const container = document.getElementById("food-list-container");

        if (!foodArray || foodArray.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding: 20px 0; font-weight:bold;">🎉 目前沒有即將過期的食物！</div>`;
            return;
        }

        let html = "";
        foodArray.forEach(item => {
            const isUrgent = item.days_left <= 3;
            const badgeClass = isUrgent ? "food-badge urgent" : "food-badge";
            
            let daysText = "";
            if (item.days_left < 0) {
                daysText = `已過期 ${Math.abs(item.days_left)} 天`;
            } else if (item.days_left === 0) {
                daysText = `今日到期`;
            } else {
                daysText = `剩 ${item.days_left} 天`;
            }

            html += `
                <div class="food-item">
                    <span class="food-name">${item.name}</span>
                    <span class="${badgeClass}">${daysText}</span>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // 初始化頁面
    updateHeaderDate();
    fetchDashboardData();
    setInterval(fetchDashboardData, 60000);
</script>

</body>
</html>
