<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>LILYGO T5 4.7" (960x540) E-Paper Real-time Preview</title>
    <style>
        body {
            background-color: #d8d8d8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .epaper-screen {
            width: 960px;
            height: 540px;
            background-color: #ffffff;
            border: 6px solid #000000;
            box-sizing: border-box;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: #000000;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #000000;
            padding-bottom: 4px;
        }
        .top-bar .title {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
        }
        .top-bar .update-time {
            font-size: 15px;
            font-weight: bold;
        }
        .main-container {
            display: flex;
            flex: 1;
            gap: 16px;
            overflow: hidden;
        }
        .left-col {
            flex: 1.15;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .right-col {
            flex: 0.85;
            border-left: 3px solid #000000;
            padding-left: 16px;
            display: flex;
            flex-direction: column;
        }
        .section-header {
            font-size: 16px;
            font-weight: bold;
            background-color: #000000;
            color: #ffffff;
            padding: 3px 8px;
            display: inline-block;
            margin-bottom: 6px;
            border-radius: 2px;
        }
        .bus-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .bus-card {
            border: 2px solid #000000;
            padding: 6px 10px;
            border-radius: 4px;
        }
        .bus-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2px;
        }
        .bus-route {
            font-size: 24px;
            font-weight: 900;
        }
        .bus-stop {
            font-size: 13px;
            font-weight: 600;
            color: #333333;
        }
        .bus-dest {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .bus-eta-row {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            align-items: baseline;
            background-color: #f0f0f0;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .eta-main {
            font-size: 28px;
            font-weight: 900;
        }
        .eta-sub {
            font-size: 16px;
            font-weight: bold;
        }
        .weather-container {
            border: 2px solid #000000;
            padding: 6px 8px;
            border-radius: 4px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .weather-grid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
        }
        .weather-item {
            text-align: center;
            flex: 1;
            border-right: 1px dashed #000000;
            padding-right: 2px;
        }
        .weather-item:last-child {
            border-right: none;
            padding-right: 0;
        }
        .district-name {
            font-size: 14px;
            font-weight: bold;
        }
        .weather-icon {
            font-size: 22px;
            margin: 2px 0;
        }
        .temp-text {
            font-size: 15px;
            font-weight: 900;
        }
        .rh-text {
            font-size: 12px;
            font-weight: 600;
        }
        .food-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 2px;
            flex: 1;
        }
        .food-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #000000;
            padding: 5px 0;
            font-size: 15px;
        }
        .food-name {
            font-weight: bold;
            max-width: 170px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .badge {
            font-size: 12px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #000000;
        }
        .badge-danger { background-color: #000000; color: #ffffff; }
        .badge-warning { background-color: #e0e0e0; color: #000000; }
        .badge-normal { background-color: #ffffff; color: #000000; }
        .loading { font-size: 24px; font-weight: bold; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div class="epaper-screen">
    <!-- Status Bar -->
    <div class="top-bar">
        <div class="title">HOME DASHBOARD</div>
        <div class="update-time" id="lbl-update-time">最後更新: --:--</div>
    </div>

    <div class="main-container" id="main-view">
        <!-- 左欄 -->
        <div class="left-col">
            <!-- SECTION 1 -->
            <div>
                <span class="section-header">🚌 巴士實時到站 (ETA)</span>
                <div class="bus-container">
                    <div class="bus-card">
                        <div class="bus-header"><span class="bus-route">680</span><span class="bus-stop">小瀝源草地滾球場</span></div>
                        <div class="bus-dest">往 金鐘站(東)</div>
                        <div class="bus-eta-row" id="eta-680">載入中...</div>
                    </div>
                    <div class="bus-card">
                        <div class="bus-header"><span class="bus-route">682B</span><span class="bus-stop">第一城站</span></div>
                        <div class="bus-dest">往 柴灣(東)</div>
                        <div class="bus-eta-row" id="eta-682B">載入中...</div>
                    </div>
                </div>
            </div>

            <!-- SECTION 2 -->
            <div style="flex: 1; display:flex; flex-direction:column;">
                <span class="section-header">🌤️ 地區天氣簡報</span>
                <div class="weather-container">
                    <div class="weather-grid" id="weather-grid">
                        <!-- 動態插入天氣 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 右欄 -->
        <div class="right-col">
            <span class="section-header">🥑 食品過期清單</span>
            <div class="food-list" id="food-list">
                <!-- 動態插入食物 -->
            </div>
        </div>
    </div>
</div>

<script>
    // 你的 Google Apps Script Web App 網址
    const api_url = "https://script.google.com/macros/s/AKfycbyRO1kNDXdMc2uEmgf7kEFspuDrAGbkBRi-4Nvpq_ckp2RsEMweWRHiLzEFzu913YY4/exec";

    function formatBusEta(etaArray) {
        if (!etaArray || etaArray.length === 0 || etaArray[0] === -1) {
            return `<span class="eta-sub">暫無班次資料</span>`;
        }
        let html = `<span class="eta-main">${etaArray[0]} 分鐘</span>`;
        if (etaArray[1] !== undefined && etaArray[1] !== -1) html += ` <span class="eta-sub">| ${etaArray[1]} 分</span>`;
        if (etaArray[2] !== undefined && etaArray[2] !== -1) html += ` <span class="eta-sub">| ${etaArray[2]} 分</span>`;
        return html;
    }

    function formatFoodBadge(days) {
        if (days < 0) return `<span class="badge badge-danger">已過期 ${Math.abs(days)} 天</span>`;
        if (days === 0) return `<span class="badge badge-danger">今天過期</span>`;
        if (days === 1) return `<span class="badge badge-warning">剩 1 天</span>`;
        if (days <= 3) return `<span class="badge badge-warning">剩 ${days} 天</span>`;
        return `<span class="badge badge-normal">剩 ${days} 天</span>`;
    }

    async function fetchData() {
        try {
            const response = await fetch(api_url);
            const data = await response.json();

            if (data.status === "success") {
                // 1. 更新時間
                document.getElementById("lbl-update-time").innerText = "最後更新: " + data.updated_at;

                // 2. 更新巴士
                document.getElementById("eta-680").innerHTML = formatBusEta(data.bus.bus_680);
                document.getElementById("eta-682B").innerHTML = formatBusEta(data.bus.bus_682B);

                // 3. 更新天氣 (天文台 API 為即時單一溫度，這裡做簡易範圍模擬或直接顯示即時氣溫)
                const w = data.weather;
                document.getElementById("weather-grid").innerHTML = `
                    <div class="weather-item">
                        <div class="district-name">沙田</div>
                        <div class="weather-icon">${w.shatin.icon}</div>
                        <div class="temp-text">${w.shatin.temp}°C</div>
                        <div class="rh-text">相對濕度 ${w.shatin.rh}%</div>
                    </div>
                    <div class="weather-item">
                        <div class="district-name">鰂魚涌</div>
                        <div class="weather-icon">${w.quarry_bay.icon}</div>
                        <div class="temp-text">${w.quarry_bay.temp}°C</div>
                        <div class="rh-text">相對濕度 ${w.quarry_bay.rh}%</div>
                    </div>
                    <div class="weather-item">
                        <div class="district-name">天后</div>
                        <div class="weather-icon">${w.tin_hau.icon}</div>
                        <div class="temp-text">${w.tin_hau.temp}°C</div>
                        <div class="rh-text">相對濕度 ${w.tin_hau.rh}%</div>
                    </div>
                `;

                // 4. 更新食物列表
                const foodListContainer = document.getElementById("food-list");
                foodListContainer.innerHTML = "";
                if (data.food.length === 0) {
                    foodListContainer.innerHTML = `<div style="font-size:14px; color:#666; text-align:center; margin-top:20px;">🎉 暫無即將過期食品</div>`;
                } else {
                    data.food.forEach(item => {
                        foodListContainer.innerHTML += `
                            <div class="food-item">
                                <span class="food-name">${item.name}</span>
                                ${formatFoodBadge(item.days_left)}
                            </div>
                        `;
                    });
                }
            }
        } catch (error) {
            console.error("Fetch Error:", error);
        }
    }

    // 進入網頁立刻執行，並設定每 60 秒自動刷新一次
    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
